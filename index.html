<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execute Logs</title>

<!-- Discord / Open Graph embed -->
<meta property="og:title" content="Execute Logs" />
<meta property="og:description" content="Live Roblox executor detection dashboard. See who's running scripts in real time." />
<meta property="og:image" content="https://i.imgur.com/4M34hi2.png" />
<meta property="og:url" content="https://nanihs201992-droid.github.io/shjkd/" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#2563eb" />

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, query, limitToLast, orderByKey, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://okok9k-7b233-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "okok9k-7b233",
    storageBucket:     "okok9k-7b233.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  async function autoClearOldLogs() {
    const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
    const snap = await get(ref(db, "logs"));
    if (!snap.exists()) return;
    snap.forEach(child => {
      if ((child.val().timestamp || 0) < oneWeekAgo)
        remove(ref(db, "logs/" + child.key));
    });
  }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60)   return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return Math.floor(diff / 86400) + "d ago";
  }

  window._copyJobId = function(jobId, shortId) {
    navigator.clipboard.writeText(jobId).then(() => {
      const btn = document.getElementById("copy-" + shortId);
      if (btn) { btn.textContent = "Copied!"; setTimeout(() => btn.textContent = "Copy Job ID", 1500); }
    });
  };

  function getCountry(region) {
    if (!region) return null;
    const parts = region.split(",");
    return parts.length > 1 ? parts[parts.length - 1].trim() : region.trim();
  }

  function renderCard(data) {
    const jobId   = data.jobId || "";
    const placeId = data.placeId || "";
    const shortId = jobId.substring(0, 8);
    const joinLink = placeId
      ? `https://www.roblox.com/games/start?placeId=${placeId}&gameInstanceId=${jobId}`
      : null;
    const initials = (data.displayName || "?")[0].toUpperCase();
    const colors = ["#2563eb","#7c3aed","#db2777","#059669","#d97706","#dc2626"];
    const color  = colors[data.userId % colors.length];

    return `
      <div class="card">
        <div class="card-header">
          <div class="avatar-wrap" style="--color:${color}">
            <img src="${data.avatarUrl || ''}" class="avatar"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
            <div class="avatar-fallback" style="background:${color}20;color:${color};border-color:${color}40">${initials}</div>
          </div>
          <div class="card-title">
            <span class="display-name">${data.displayName || '?'}</span>
            <span class="username">@${data.username || '?'}</span>
          </div>
          <span class="time-badge">${timeAgo(data.timestamp || Date.now())}</span>
        </div>

        <div class="card-fields">
          <div class="field">
            <span class="label">Executor</span>
            <span class="value accent" style="color:${color}">${data.executor || 'Unknown'}</span>
          </div>
          <div class="field">
            <span class="label">Game</span>
            <span class="value">${data.game || 'Unknown'}</span>
          </div>
          <div class="field">
            <span class="label">Region</span>
            <span class="value">${data.region || 'Unknown'}</span>
          </div>
          <div class="field">
            <span class="label">Job ID</span>
            <span class="value mono" title="${jobId}">${shortId}…</span>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-ghost" id="copy-${shortId}"
            onclick="window._copyJobId('${jobId}','${shortId}')">Copy Job ID</button>
          ${joinLink
            ? `<a class="btn-primary" href="${joinLink}" target="_blank">Join Server →</a>`
            : `<span class="btn-primary disabled">No Place ID</span>`}
        </div>

        <a class="btn-outline" href="https://www.roblox.com/users/${data.userId}/profile" target="_blank">
          View Profile →
        </a>
      </div>
    `;
  }

  function init() {
    autoClearOldLogs();

    const grid   = document.getElementById("grid");
    const counter= document.getElementById("counter");
    const loader = document.getElementById("loader");
    const search = document.getElementById("search");
    const regionSelect = document.getElementById("region-filter");
    let allEntries = [];

    function renderFiltered() {
      const q      = search.value.toLowerCase().trim();
      const region = regionSelect.value.toLowerCase();

      let filtered = allEntries;
      if (q) filtered = filtered.filter(d =>
        (d.displayName || "").toLowerCase().includes(q) ||
        (d.username || "").toLowerCase().includes(q)
      );
      if (region) filtered = filtered.filter(d => {
        const c = getCountry(d.region || "").toLowerCase();
        return c.includes(region);
      });

      counter.textContent = filtered.length;
      grid.innerHTML = filtered.length
        ? filtered.map(renderCard).join("")
        : '<p class="empty">No results found.</p>';
    }

    function populateRegions(entries) {
      const countries = [...new Set(entries.map(d => getCountry(d.region)).filter(Boolean))].sort();
      const current = regionSelect.value;
      regionSelect.innerHTML = '<option value="">All Regions</option>';
      countries.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c; opt.textContent = c;
        if (c === current) opt.selected = true;
        regionSelect.appendChild(opt);
      });
    }

    search.addEventListener("input", renderFiltered);
    regionSelect.addEventListener("change", renderFiltered);

    const logsRef = query(ref(db, "logs"), orderByKey(), limitToLast(1000));
    onValue(logsRef, snapshot => {
      loader.style.display = "none";
      const val = snapshot.val();
      if (!val) {
        allEntries = [];
        grid.innerHTML = '<p class="empty">No executions logged yet.</p>';
        counter.textContent = 0;
        return;
      }
      allEntries = Object.values(val).reverse();
      populateRegions(allEntries);
      renderFiltered();
    });
  }

  window.addEventListener("DOMContentLoaded", init);
</script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f2f5;
    color: #111827;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: #2563eb;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }

  .site-title {
    font-size: 1rem;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.3px;
  }
  .site-title span { color: #2563eb; }

  .live-pill {
    display: flex; align-items: center; gap: 6px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #2563eb;
    margin-left: auto;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN ── */
  main { max-width: 1140px; margin: 0 auto; padding: 28px 20px; }

  /* ── FILTERS ── */
  .filters {
    display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
  }

  .search-bar, .region-select {
    background: #fff;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    color: #111827;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar { flex: 1; min-width: 200px; }
  .region-select { min-width: 160px; cursor: pointer; }
  .search-bar::placeholder { color: #9ca3af; }
  .search-bar:focus, .region-select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }

  /* ── GRID ── */
  #loader {
    text-align: center; padding: 80px;
    color: #9ca3af; font-size: 0.875rem;
  }
  .empty {
    text-align: center; padding: 80px;
    color: #9ca3af; font-size: 0.875rem;
    grid-column: 1/-1;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1.5px solid #e5e7eb;
    border-radius: 14px;
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
    border-color: #bfdbfe;
  }

  /* ── CARD HEADER ── */
  .card-header { display: flex; align-items: center; gap: 12px; }

  .avatar-wrap { width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px; overflow: hidden; }
  .avatar { width: 44px; height: 44px; object-fit: cover; display: block; }
  .avatar-fallback {
    display: none; width: 44px; height: 44px;
    border-radius: 10px; border: 2px solid;
    align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700;
  }

  .card-title { flex: 1; overflow: hidden; }
  .display-name { display: block; font-weight: 700; font-size: 0.95rem; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .username { display: block; font-size: 0.75rem; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .time-badge {
    font-size: 0.7rem; font-weight: 500;
    background: #f3f4f6; color: #6b7280;
    padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── FIELDS ── */
  .card-fields {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    background: #f9fafb; border-radius: 10px; padding: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 2px; }
  .label { font-size: 0.65rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
  .value { font-size: 0.82rem; font-weight: 600; color: #374151; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .value.mono { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #6b7280; }

  /* ── BUTTONS ── */
  .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn-ghost, .btn-primary, .btn-outline {
    display: block; text-align: center;
    padding: 9px 12px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 600;
    cursor: pointer; text-decoration: none;
    transition: all 0.15s;
    border: none;
  }

  .btn-ghost {
    background: #f3f4f6; color: #374151;
    border: 1.5px solid #e5e7eb;
  }
  .btn-ghost:hover { background: #e5e7eb; }

  .btn-primary {
    background: #2563eb; color: #fff;
    border: 1.5px solid #2563eb;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  .btn-outline {
    background: transparent; color: #2563eb;
    border: 1.5px solid #bfdbfe;
    font-size: 0.78rem;
  }
  .btn-outline:hover { background: #eff6ff; border-color: #2563eb; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    header { padding: 0 16px; }
    main { padding: 16px 12px; }
    #grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  </div>
  <div class="site-title">Execute <span>Logs</span></div>
  <div class="live-pill">
    <div class="live-dot"></div>
    Live · <span id="counter">0</span> entries
  </div>
</header>

<main>
  <div class="filters">
    <input id="search" class="search-bar" type="text"
      placeholder="Search name or username…" autocomplete="off" spellcheck="false"/>
    <select id="region-filter" class="region-select">
      <option value="">All Regions</option>
    </select>
  </div>
  <div id="loader">Loading logs…</div>
  <div id="grid"></div>
</main>

</body>
</html>
