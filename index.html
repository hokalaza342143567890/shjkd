<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execute Logs</title>
<meta property="og:title" content="Execute Logs" />
<meta property="og:description" content="Live Roblox executor detection dashboard." />
<meta property="og:image" content="https://i.imgur.com/4M34hi2.png" />
<meta name="theme-color" content="#2563eb" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, query, limitToLast, orderByKey, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  databaseURL: "https://okok9k-7b233-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:   "okok9k-7b233"
}));



// ── AVATAR (fetched by viewer's browser via CORS proxy — zero game impact) ──
const avatarCache = {};

async function fetchAvatarsBatch(userIds) {
  const missing = [...new Set(userIds)].filter(id => id && avatarCache[id] === undefined);
  if (!missing.length) return;
  // Mark as pending so we don't double-fetch
  missing.forEach(id => avatarCache[id] = null);
  for (let i = 0; i < missing.length; i += 100) {
    const batch = missing.slice(i, i + 100);
    try {
      const apiUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${batch.join(',')}&size=150x150&format=Png&isCircular=false`;
      const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`);
      if (!res.ok) throw new Error();
      const json = await res.json();
      (json.data || []).forEach(d => {
        avatarCache[d.targetId] = d.imageUrl || null;
      });
    } catch(e) {
      // Fallback: try without proxy (in case CORS is allowed)
      try {
        const apiUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${batch.join(',')}&size=150x150&format=Png&isCircular=false`;
        const res = await fetch(apiUrl);
        const json = await res.json();
        (json.data || []).forEach(d => {
          avatarCache[d.targetId] = d.imageUrl || null;
        });
      } catch(e2) {}
    }
  }
  // Re-render cards with new avatars
  if (window._rerender) window._rerender();
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60)    return d + "s ago";
  if (d < 3600)  return Math.floor(d/60) + "m ago";
  if (d < 86400) return Math.floor(d/3600) + "h ago";
  return Math.floor(d/86400) + "d ago";
}
function getCountry(r) {
  if (!r) return "";
  const p = r.split(",");
  return p.length > 1 ? p[p.length-1].trim() : r.trim();
}
const COLORS = ["#2563eb","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0891b2"];

// ── SOUND ────────────────────────────────────────────────────────────────────
let audioCtx;
function playPing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
  } catch(e) {}
}

// ── COPY ─────────────────────────────────────────────────────────────────────
window._copy = (jobId, shortId) => {
  navigator.clipboard.writeText(jobId).then(() => {
    const b = document.getElementById("cp-"+shortId);
    if (!b) return;
    const t = b.textContent;
    b.textContent = "Copied!";
    setTimeout(() => b.textContent = t, 1500);
  });
};

// ── EXPORT CSV ───────────────────────────────────────────────────────────────
window._csv = (entries) => {
  const rows = [["DisplayName","Username","Executor","Game","Region","JobId","PlaceId","Timestamp","Left"]];
  entries.forEach(d => rows.push([
    d.displayName, d.username, d.executor, d.game, d.region,
    d.jobId, d.placeId, new Date(d.timestamp).toISOString(),
    d.left === true ? "Yes" : d.left === false ? "No" : "Unknown"
  ]));
  const csv = rows.map(r => r.map(v => `"${(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = Object.assign(document.createElement("a"), {
    href: "data:text/csv;charset=utf-8," + encodeURIComponent(csv),
    download: "execute_logs.csv"
  });
  a.click();
};

// ── RENDER CARD ──────────────────────────────────────────────────────────────
function renderCard(data) {
  const jobId   = data.jobId || "";
  const shortId = jobId.substring(0, 8);
  const color   = COLORS[(data.userId||0) % COLORS.length];
  const av      = avatarCache[data.userId] || data.avatarUrl || "";
  const init    = (data.displayName||"?")[0].toUpperCase();
  const join    = data.placeId && jobId
    ? `roblox://experiences/start?placeId=${data.placeId}&gameInstanceId=${jobId}` : null;
  const status  = data.left === true ? "left" : data.left === false ? "online" : "unknown";
  const statusLabel = data.left === true ? "🔴 Left" : data.left === false ? "🟢 In Server" : "⚪ Unknown";
  return `
  <div class="card">
    <div class="card-top">
      <div class="av" style="--c:${color}">
        ${av ? `<img src="${av}" loading="lazy" onerror="this.style.display='none'">` : ""}
        <span>${init}</span>
      </div>
      <div class="card-name">
        <b>${data.displayName||"?"}</b>
        <small>@${data.username||"?"}</small>
      </div>
      <span class="tbadge">${timeAgo(data.timestamp||Date.now())}</span>
    </div>
    <span class="status ${status}">${statusLabel}</span>
    <div class="fields">
      <div class="f"><span class="fl">Executor</span><span class="fv" style="color:${color}">${data.executor||"?"}</span></div>
      <div class="f"><span class="fl">Game</span><span class="fv">${data.game||"?"}</span></div>
      <div class="f"><span class="fl">Region</span><span class="fv">${data.region||"?"}</span></div>
      <div class="f"><span class="fl">Job ID</span><span class="fv mono" title="${jobId}">${shortId}…</span></div>
    </div>
    <div class="acts">
      <button id="cp-${shortId}" onclick="window._copy('${jobId}','${shortId}')">Copy Job ID</button>
      ${join ? `<a href="${join}" target="_blank" class="join">Join →</a>` : `<span class="join dis">No Place</span>`}
    </div>
    <a class="prof" href="https://www.roblox.com/users/${data.userId}/profile" target="_blank">View Profile →</a>
  </div>`;
}

function renderList(data) {
  const color  = COLORS[(data.userId||0) % COLORS.length];
  const status = data.left === true ? "left" : data.left === false ? "online" : "unknown";
  const jobId  = data.jobId || "";
  const shortId = jobId.substring(0,8);
  return `
  <div class="lrow">
    <span class="ldot ${status}"></span>
    <span class="lname"><b>${data.displayName||"?"}</b><small>@${data.username||"?"}</small></span>
    <span style="color:${color}">${data.executor||"?"}</span>
    <span class="lhide">${data.game||"?"}</span>
    <span class="lhide">${getCountry(data.region||"")}</span>
    <span class="ltime">${timeAgo(data.timestamp||Date.now())}</span>
    <button id="cp-${shortId}" onclick="window._copy('${jobId}','${shortId}')">Copy</button>
    ${data.placeId && jobId ? `<a href="roblox://experiences/start?placeId=${data.placeId}&gameInstanceId=${jobId}" target="_blank" class="join">Join</a>` : ""}
  </div>`;
}

// ── CHARTS ───────────────────────────────────────────────────────────────────
let execChart, hourChart;
function renderCharts(entries) {
  const execCount = {}, hourCount = {};
  for (let h=0;h<24;h++) hourCount[h]=0;
  const now = Date.now();
  entries.forEach(d => {
    const ex = d.executor || "Unknown";
    execCount[ex] = (execCount[ex]||0) + 1;
    if (d.timestamp && now - d.timestamp < 86400000)
      hourCount[new Date(d.timestamp).getHours()]++;
  });
  const exLabels = Object.keys(execCount).sort((a,b)=>execCount[b]-execCount[a]).slice(0,8);
  const isDark = document.documentElement.dataset.theme === "dark";
  const tc = isDark ? "#b0bcdc" : "#6b7280";
  const gc = isDark ? "#2e3248" : "#e5e7eb";
  const opts = (extra={}) => ({
    plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}},
    animation:false, ...extra
  });
  const c1 = document.getElementById("c1");
  const c2 = document.getElementById("c2");
  if (c1) { if(execChart) execChart.destroy(); execChart = new Chart(c1, {type:"bar",data:{labels:exLabels,datasets:[{data:exLabels.map(k=>execCount[k]),backgroundColor:COLORS,borderRadius:4}]},options:opts()}); }
  if (c2) { if(hourChart) hourChart.destroy(); hourChart = new Chart(c2, {type:"line",data:{labels:Array.from({length:24},(_,i)=>i+"h"),datasets:[{data:Array.from({length:24},(_,i)=>hourCount[i]),borderColor:"#2563eb",backgroundColor:"rgba(37,99,235,0.08)",fill:true,tension:0.4,pointRadius:2}]},options:opts()}); }
}

// ── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById("tbtn").textContent = t==="dark" ? "☀️" : "🌙";
  try { localStorage.setItem("theme", t); } catch(e){}
}
const saved = (() => { try { return localStorage.getItem("theme"); } catch(e){ return null; } })();
applyTheme(saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
  if (!localStorage.getItem("theme")) applyTheme(e.matches ? "dark" : "light");
});

// ── AUTO CLEAR ───────────────────────────────────────────────────────────────
async function autoClear() {
  const cutoff = Date.now() - 7*24*60*60*1000;
  const snap = await get(ref(db, "logs"));
  if (!snap.exists()) return;
  snap.forEach(c => { if ((c.val().timestamp||0) < cutoff) remove(ref(db,"logs/"+c.key)); });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  autoClear();

  const grid    = document.getElementById("grid");
  const counter = document.getElementById("counter");
  const loader  = document.getElementById("loader");
  const search  = document.getElementById("s-search");
  const rSel    = document.getElementById("s-region");
  const eSel    = document.getElementById("s-exec");
  const gSel    = document.getElementById("s-game");
  const sortSel = document.getElementById("s-sort");

  let all = [], viewMode = "grid", limit = 50, prevCount = 0, soundOn = true;

  // Theme toggle
  document.getElementById("tbtn").addEventListener("click", () => {
    applyTheme(document.documentElement.dataset.theme==="dark" ? "light" : "dark");
  });

  // Sound toggle
  const sbtn = document.getElementById("sbtn");
  sbtn.addEventListener("click", () => {
    soundOn = !soundOn;
    sbtn.textContent = soundOn ? "🔔" : "🔕";
  });

  // View toggle
  document.getElementById("vgrid").addEventListener("click", () => {
    viewMode="grid"; render();
    document.getElementById("vgrid").classList.add("active");
    document.getElementById("vlist").classList.remove("active");
  });
  document.getElementById("vlist").addEventListener("click", () => {
    viewMode="list"; render();
    document.getElementById("vlist").classList.add("active");
    document.getElementById("vgrid").classList.remove("active");
  });

  // Export
  document.getElementById("ebtn").addEventListener("click", () => window._csv(all));

  function render() {
    const q  = search.value.toLowerCase().trim();
    const r  = rSel.value.toLowerCase();
    const e  = eSel.value.toLowerCase();
    const g  = gSel.value.toLowerCase();
    const s  = sortSel.value;

    let filtered = all.filter(d => {
      if (q && !(d.displayName||"").toLowerCase().includes(q) && !(d.username||"").toLowerCase().includes(q)) return false;
      if (r && !getCountry(d.region||"").toLowerCase().includes(r)) return false;
      if (e && !(d.executor||"").toLowerCase().includes(e)) return false;
      if (g && !(d.game||"").toLowerCase().includes(g)) return false;
      return true;
    });
    if (s === "oldest") filtered = [...filtered].reverse();

    counter.textContent = filtered.length;
    const shown = filtered.slice(0, limit);
    const more  = filtered.length > limit;

    if (viewMode === "list") {
      grid.className = "lview";
      grid.innerHTML = shown.length
        ? shown.map(renderList).join("") + (more ? `<div class="morebtn"><button onclick="window._more()">Load more (${filtered.length-limit} remaining)</button></div>` : "")
        : `<p class="empty">No results.</p>`;
    } else {
      grid.className = "gview";
      grid.innerHTML = shown.length
        ? shown.map(renderCard).join("") + (more ? `<div class="morecard"><button onclick="window._more()">Load more (${filtered.length-limit} remaining)</button></div>` : "")
        : `<p class="empty">No results.</p>`;
    }
  }

  // Load more — needs access to limit/render
  window._more = () => { limit += 50; render(); };

  function fill(sel, items, label) {
    const cur = sel.value;
    sel.innerHTML = `<option value="">${label}</option>`;
    items.forEach(v => {
      const o = document.createElement("option");
      o.value = v; o.textContent = v;
      if (v === cur) o.selected = true;
      sel.appendChild(o);
    });
  }

  function updateStats(entries) {
    const now = Date.now();
    document.getElementById("st-today").textContent = entries.filter(d=>now-d.timestamp<86400000).length;
    document.getElementById("st-week").textContent  = entries.length;
    document.getElementById("st-hour").textContent  = entries.filter(d=>now-d.timestamp<3600000).length;
    const cc = {};
    entries.forEach(d=>{ const c=getCountry(d.region||""); if(c) cc[c]=(cc[c]||0)+1; });
    document.getElementById("st-top").textContent = Object.keys(cc).sort((a,b)=>cc[b]-cc[a])[0] || "—";
    document.getElementById("recent-bar").textContent =
      entries.filter(d=>now-d.timestamp<3600000).length + " execution(s) in the last hour";
    setTimeout(() => renderCharts(entries), 80);
  }

  [search,rSel,eSel,gSel,sortSel].forEach(el => {
    el.addEventListener("input",  () => { limit=50; render(); });
    el.addEventListener("change", () => { limit=50; render(); });
  });

  // Refresh timestamps
  setInterval(() => {
    document.querySelectorAll("[data-ts]").forEach(el => {
      el.textContent = timeAgo(+el.dataset.ts);
    });
  }, 30000);

  const logsRef = query(ref(db,"logs"), orderByKey(), limitToLast(1000));
  onValue(logsRef, snapshot => {
    loader.style.display = "none";
    const val = snapshot.val();
    if (!val) {
      all = [];
      grid.className = "gview";
      grid.innerHTML = `<p class="empty">No executions logged yet.</p>`;
      counter.textContent = 0;
      return;
    }
    const entries = Object.values(val).reverse();
    if (soundOn && prevCount > 0 && entries.length > prevCount) playPing();
    prevCount = entries.length;
    all = entries;

    // Populate filters
    fill(rSel, [...new Set(entries.map(d=>getCountry(d.region)).filter(Boolean))].sort(), "All Regions");
    fill(eSel, [...new Set(entries.map(d=>d.executor).filter(Boolean))].sort(), "All Executors");
    fill(gSel, [...new Set(entries.map(d=>d.game).filter(Boolean))].sort(), "All Games");

    updateStats(entries);

    // Fetch avatars via RoProxy in background — no impact on game
    const ids = [...new Set(all.map(d => d.userId).filter(Boolean))];
    fetchAvatarsBatch(ids).then(() => render());

    window._rerender = render;
    render();
    // Fetch avatars in background via browser — doesn't affect game at all
    const ids = [...new Set(all.map(d => d.userId).filter(Boolean))];
    fetchAvatarsBatch(ids);
  });
}

window.addEventListener("DOMContentLoaded", init);
</script>

<style>
:root {
  --bg:#f0f2f5; --sur:#fff; --bdr:#e5e7eb;
  --txt:#111827; --mut:#6b7280; --sub:#9ca3af;
  --bl:#2563eb; --bll:#eff6ff; --blb:#bfdbfe;
  --fbg:#f9fafb; --shd:rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg:#0f1117; --sur:#1c1f2e; --bdr:#2e3248;
  --txt:#f0f4ff; --mut:#b0bcdc; --sub:#7b8ab8;
  --bl:#60a5fa; --bll:rgba(96,165,250,0.1); --blb:#3b5fc0;
  --fbg:#161926; --shd:rgba(0,0,0,0.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;transition:background .2s,color .2s}

/* HEADER */
header{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px var(--shd)}
.logo{width:28px;height:28px;background:var(--bl);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}
.htitle{font-size:.88rem;font-weight:700}
.lpill{display:flex;align-items:center;gap:5px;background:var(--bll);border:1px solid var(--blb);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:600;color:var(--bl);margin-left:auto;white-space:nowrap}
.ldot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hbtns{display:flex;gap:5px}
.ibtn{background:var(--fbg);border:1px solid var(--bdr);border-radius:7px;padding:5px 8px;cursor:pointer;font-size:.78rem;transition:background .15s;color:var(--txt)}
.ibtn:hover{background:var(--bdr)}
.ibtn.active{background:var(--bl);border-color:var(--bl);color:#fff}

/* MAIN */
main{max-width:1140px;margin:0 auto;padding:14px 12px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px}
.sl{font-size:.6rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sv{font-size:1.25rem;font-weight:700;color:var(--txt);line-height:1}
.ss{font-size:.62rem;color:var(--sub);margin-top:2px}

/* RECENT BAR */
#recent-bar{font-size:.7rem;color:var(--mut);margin-bottom:10px;padding:7px 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:8px}

/* CHARTS */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cc{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px}
.ct{font-size:.62rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* FILTERS */
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.fi{background:var(--sur);border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:.78rem;padding:7px 10px;outline:none;transition:border-color .2s,box-shadow .2s;min-width:0}
.fi:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fi::placeholder{color:var(--sub)}
#s-search{flex:1;min-width:140px}

/* TOOLBAR */
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tbar span{font-size:.7rem;color:var(--sub)}
.ebtn{margin-left:auto;background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:5px 11px;font-size:.7rem;font-weight:600;color:var(--mut);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.ebtn:hover{border-color:var(--bl);color:var(--bl)}

/* LOADER / EMPTY */
#loader{text-align:center;padding:60px;color:var(--sub);font-size:.85rem}
.empty{text-align:center;padding:60px;color:var(--sub);font-size:.85rem;grid-column:1/-1}

/* GRID */
.gview{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px}
.card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:13px;display:flex;flex-direction:column;gap:10px;animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--blb)}

/* CARD PARTS */
.card-top{display:flex;align-items:center;gap:9px}
.av{width:36px;height:36px;border-radius:8px;overflow:hidden;background:color-mix(in srgb,var(--c) 15%,transparent);border:1.5px solid color-mix(in srgb,var(--c) 30%,transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:6px;z-index:2}
.av span{font-size:.9rem;font-weight:700;color:var(--c);position:relative;z-index:1}
.card-name{flex:1;overflow:hidden}
.card-name b{display:block;font-size:.83rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name small{display:block;font-size:.67rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbadge{font-size:.6rem;font-weight:500;background:var(--fbg);color:var(--mut);padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;border:1px solid var(--bdr)}

/* STATUS */
.status{display:inline-flex;align-items:center;font-size:.67rem;font-weight:600;padding:3px 9px;border-radius:20px;width:fit-content}
.status.online{background:rgba(34,197,94,.12);color:#16a34a}
.status.left  {background:rgba(239,68,68,.12); color:#dc2626}
.status.unknown{background:var(--fbg);color:var(--mut)}
[data-theme="dark"] .status.online{background:rgba(74,222,128,.15);color:#4ade80}
[data-theme="dark"] .status.left  {background:rgba(248,113,113,.15);color:#f87171}

/* FIELDS */
.fields{display:grid;grid-template-columns:1fr 1fr;gap:7px;background:var(--fbg);border-radius:8px;padding:9px}
.f{display:flex;flex-direction:column;gap:1px}
.fl{font-size:.56rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.fv{font-size:.73rem;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fv.mono{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--mut)}

/* ACTIONS */
.acts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.acts button,.join,.prof{display:block;text-align:center;padding:7px 8px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;border:none}
.acts button{background:var(--fbg);color:var(--mut);border:1.5px solid var(--bdr)}
.acts button:hover{background:var(--bdr)}
.join{background:var(--bl);color:#fff;border:1.5px solid var(--bl)}
.join:hover{opacity:.9}
.join.dis{opacity:.35;cursor:not-allowed;pointer-events:none}
.prof{background:transparent;color:var(--bl);border:1.5px solid var(--blb);font-size:.68rem}
.prof:hover{background:var(--bll)}

/* LIST VIEW */
.lview{display:flex;flex-direction:column;border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.lrow{display:grid;grid-template-columns:8px 1fr .8fr 1fr 1fr .7fr auto;gap:10px;align-items:center;padding:8px 12px;background:var(--sur);border-bottom:1px solid var(--bdr);font-size:.75rem}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--fbg)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ldot.online{background:#22c55e;box-shadow:0 0 4px #22c55e}
.ldot.left  {background:#ef4444}
.ldot.unknown{background:var(--sub)}
.lname{display:flex;flex-direction:column;overflow:hidden}
.lname b{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lname small{font-size:.65rem;color:var(--sub)}
.ltime{font-size:.67rem;color:var(--sub)}
.lrow button,.lrow a{padding:4px 8px;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;text-decoration:none;color:var(--mut);background:var(--fbg);border:1px solid var(--bdr);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.lrow button:hover,.lrow a:hover{border-color:var(--bl);color:var(--bl)}
.lrow a.join{background:var(--bl);color:#fff;border-color:var(--bl)}
.lrow a.join:hover{opacity:.9}

/* LOAD MORE */
.morecard{grid-column:1/-1;padding:16px;text-align:center}
.morebtn{padding:14px;text-align:center;border-top:1px solid var(--bdr)}
.morecard button,.morebtn button{background:var(--sur);border:1.5px solid var(--bdr);border-radius:9px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--txt);cursor:pointer;transition:all .2s}
.morecard button:hover,.morebtn button:hover{border-color:var(--bl);color:var(--bl);background:var(--bll)}

/* RESPONSIVE */
@media(max-width:640px){
  header{padding:0 10px;height:46px}
  .htitle{font-size:.78rem}
  main{padding:10px 8px}
  .stats{grid-template-columns:1fr 1fr;gap:7px}
  .sv{font-size:1.05rem}
  .charts{grid-template-columns:1fr}
  .gview{grid-template-columns:1fr}
  .lhide{display:none}
  .lrow{grid-template-columns:8px 1fr .8fr .7fr auto}
}
@media(max-width:380px){
  .hbtns .ibtn:nth-child(3),.hbtns .ibtn:nth-child(4){display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
  <span class="htitle">Execute Logs</span>
  <div class="lpill"><div class="ldot"></div>Live · <span id="counter">0</span></div>
  <div class="hbtns">
    <button class="ibtn" id="tbtn">🌙</button>
    <button class="ibtn" id="sbtn">🔔</button>
    <button class="ibtn active" id="vgrid">▦</button>
    <button class="ibtn" id="vlist">☰</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="sc"><div class="sl">Today</div><div class="sv" id="st-today">0</div><div class="ss">executions</div></div>
    <div class="sc"><div class="sl">This Week</div><div class="sv" id="st-week">0</div><div class="ss">total logs</div></div>
    <div class="sc"><div class="sl">Last Hour</div><div class="sv" id="st-hour">0</div><div class="ss">executions</div></div>
    <div class="sc"><div class="sl">Top Country</div><div class="sv" style="font-size:.9rem" id="st-top">—</div><div class="ss">most active</div></div>
  </div>

  <div id="recent-bar">Loading...</div>

  <div class="charts">
    <div class="cc"><div class="ct">Executors</div><canvas id="c1" height="110"></canvas></div>
    <div class="cc"><div class="ct">Executions by Hour</div><canvas id="c2" height="110"></canvas></div>
  </div>

  <div class="frow">
    <input id="s-search" class="fi" type="text" placeholder="Search name or username…" autocomplete="off">
    <select id="s-region" class="fi"><option value="">All Regions</option></select>
    <select id="s-exec"   class="fi"><option value="">All Executors</option></select>
    <select id="s-game"   class="fi"><option value="">All Games</option></select>
    <select id="s-sort"   class="fi"><option value="newest">Newest first</option><option value="oldest">Oldest first</option></select>
  </div>

  <div class="tbar">
    <span id="tbar-info"></span>
    <button class="ebtn" id="ebtn">⬇ Export CSV</button>
  </div>

  <div id="loader">Loading logs…</div>
  <div id="grid" class="gview"></div>
</main>

</body>
</html>
